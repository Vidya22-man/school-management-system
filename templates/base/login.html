<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>School Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <style>
        .login-card {
          background: rgba(255, 255, 255, 0.9);
          border-radius: 20px;
          backdrop-filter: blur(10px);
      }
        .login-card input {
           border:1px solid #0b164f;
           border-radius:50px;
            padding: 10px;
        }


    </style>


</head>


<body style="background: linear-gradient(to right, #757F9A 0%, #D7DDE8 51%, #757F9A 100%);
            height: 100vh;">


{% load crispy_forms_tags %}


<div class="container d-flex flex-column justify-content-center align-items-center mt-3" style="min-height:100vh;">

    <h2 class="text-whie fw-bold mb-4 display-3" style="color:#3d310d;">
        <i class="fa-solid fa-school"></i> School Management System
    </h2>

    <div class="col-md-6 p-4 login-card border shadow-lg">

        <div>
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags}} alert-dismissible fade show ">
                {{message}}
                <button type="button" class="btn btn-close " data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}
        </div>

        <h3 class="text-center mb-2">Login</h3>
        <hr>
        <form action="{% url 'login'  %}" method="POST">
            {% csrf_token %}
            {{form | crispy}}
            <div class="d-flex justify-content-center">
                <button type="submit" class="btn btn-outline-nfo fw-bold btn-custom "
                        style="border-radius:30px; padding:10px 40px;background:#0b164f;border:none;color:#fff; padding:10px 40px;">
                    Login
                </button>
            </div>
            <p class="text-center fw-bold fs-5">Or</p>
            <div class="d-flex justify-content-center">
                <a href="{% url 'register' %}" class="btn btn-outline-primary fw-bold text-center"
                   style="border-radius:30px;padding:10px 40px;background:linear-gradient(to right,#FF7DB0,#FF0087);border:none;color:#fff;">Register</a>
            </div>


        </form>
    </div>


</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
