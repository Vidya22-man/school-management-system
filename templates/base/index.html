<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>School Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>


</head>
<body>


{% load crispy_forms_tags %}


<div class="container d-flex justify-content-center align-items-center mt-3" style="min-height:100vh;">
    <div class="col-md-6 p-4 border shadow-lg">

        <div>
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags}} alert-dismissible fade show ">
                {{message}}
                <button type="button" class="btn btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}
        </div>

        <h3 class="text-center mb-2">Login</h3>
        <hr>
        <form action="{% url 'login'  %}" method="POST">
            {% csrf_token %}
            {{form | crispy}}
            <div class="d-flex justify-content-center">
                <button type="submit" class="btn btn-warning fw-bold ">Login</button>
            </div>
            <p class="text-center fw-bold fs-5">Or</p>
            <div class="d-flex justify-content-center">
                <a href="{% url 'register' %}" class="btn btn-outline-primary  fw-bold text-center">Register</a>
            </div>


        </form>
    </div>


</div>


</body>
</html>
