{% extends 'base/base.html' %}
{% block content %}
{%  load crispy_forms_tags %}
{% include 'base/sidebar.html' %}

<div class="container mt-3" style="margin-left:300px;">
    <div class="navbar navbar-expand-lg bg-body-tertiary">
        <h5 class="ms-auto me-5 text-muted ">home</h5>
        <a href="" class="text-decoration-none text-danger fw-bold"><i class="fa-solid fa-power-off me-1"></i>Logout</a>
    </div>

    <div class="mt-5 p-5" style="background:#edf2ef;">
        <h1 class="display-4 fw-bold">Manage Staff</h1>
    </div>


    <div class="card mt-5" style="background:#fdf0d5;">
        <div class="card-header d-flex justify-content-between">
            <h1 style="color:#08044a;">Edit Staff Details</h1>
        </div>
    </div>
    <div class="card-body mt-3">
        <form action="" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{form | crispy }}
            <button type="submit" class="btn btn-warning fw-bold mb-5" style="padding:20px 50px;background:linear-gradient(to right, #c21500 0%, #ffc500  51%, #c21500  100%)">Update</button>

        </form>
    </div>


</div>



{% endblock %}
